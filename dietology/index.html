<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Илья Петрович Захаров — врач-терапевт. Работаю с физиологией, не сажаю на диету.">
<meta name="robots" content="index, follow">
<meta property="og:title" content="Илья Петрович Захаров — врач-терапевт">
<meta property="og:description" content="Если не получилось похудеть раньше, со мной точно получится. Работаю с физиологией, не сажаю на диету.">
<meta property="og:type" content="website">
<meta property="og:locale" content="ru_RU">
<title>Илья Петрович Захаров — врач-терапевт</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0b0e;--bg2:#101014;--card:#13131a;--card2:#18181f;
  --border:#222230;--accent:#7c3aed;--accent2:#9d5cf7;--accent3:#c084fc;
  --text:#ededf5;--muted:#5c5c7a;--muted2:#8a8aaa;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Golos Text',sans-serif;overflow-x:hidden;}

nav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:15px 52px;
  background:rgba(11,11,14,0.92);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.logo{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;}

.hero{
  position:relative;max-width:880px;margin:0 auto;
  padding:120px 48px 96px;text-align:center;
}
.hero-glow{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:700px;height:420px;
  background:radial-gradient(ellipse at center,rgba(124,58,237,.2) 0%,transparent 68%);
  pointer-events:none;
}
.pills{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:32px;position:relative;}
.pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid;
  background:rgba(124,58,237,.12);border-color:rgba(124,58,237,.3);color:var(--accent3);
}
h1{
  font-family:'Unbounded',sans-serif;
  font-size:clamp(36px,6vw,64px);font-weight:900;
  line-height:1.08;letter-spacing:-1.5px;margin-bottom:22px;position:relative;
}
h1 em{font-style:normal;color:var(--accent2);}
.hero-sub{font-size:18px;color:var(--muted2);line-height:1.7;max-width:560px;margin:0 auto 36px;position:relative;}

.sec{max-width:880px;margin:0 auto;padding:60px 48px;}
.sec-label{font-size:11px;font-weight:700;letter-spacing:4px;color:var(--accent2);text-transform:uppercase;text-align:center;margin-bottom:14px;}
.sec-title{font-family:'Unbounded',sans-serif;font-size:clamp(22px,4vw,36px);font-weight:800;text-align:center;line-height:1.2;margin-bottom:40px;}

.approach{
  background:var(--card);border:1px solid var(--border);border-radius:18px;
  padding:36px 32px;text-align:center;
}
.approach p{font-size:17px;color:var(--text);line-height:1.6;}
.approach p b{color:var(--accent3);}

footer{
  border-top:1px solid var(--border);
  padding:40px 48px;text-align:center;
  color:var(--muted);font-size:12px;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.hero>*{animation:fadeUp .65s ease both;}
.hero>*:nth-child(2){animation-delay:.1s}
.hero>*:nth-child(3){animation-delay:.2s}
.hero>*:nth-child(4){animation-delay:.3s}

@media(max-width:700px){
  nav{padding:13px 20px;}
  .hero,.sec{padding-left:20px;padding-right:20px;}
  .hero{padding-top:70px;padding-bottom:60px;}
  footer{padding:32px 20px;}
}
</style>
</head>
<body>

<nav>
  <div class="logo">И. П. ЗАХАРОВ</div>
</nav>

<section class="hero">
  <div class="hero-glow"></div>
  <div class="pills">
    <span class="pill">Врач-терапевт · 8 лет стажа</span>
  </div>
  <h1>Илья Петрович<br><em>Захаров</em></h1>
  <p class="hero-sub">Если не получилось похудеть раньше — со мной точно получится.</p>
</section>

<section class="sec">
  <div class="sec-label">Подход</div>
  <h2 class="sec-title">Не сажаю на диету — <em>работаю с физиологией</em></h2>
  <div class="approach">
    <p>Снижение веса — это не про ограничения. Это про то, как работает <b>твой организм</b>.</p>
  </div>
</section>

<footer>
  © Илья Петрович Захаров
</footer>

</body>
</html>
